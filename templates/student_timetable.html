<!DOCTYPE html>
<html>
<head>
    <title>My Timetable</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh}
        .navbar{background:rgba(44,62,80,0.95);padding:15px 30px;display:flex;justify-content:space-between;align-items:center}
        .navbar h1{color:white}
        .nav-links button{background:#3498db;color:white;border:none;padding:10px 20px;margin:0 5px;border-radius:5px;cursor:pointer}
        .container{max-width:1000px;margin:40px auto;padding:20px}
        .content-card{background:rgba(255,255,255,0.95);padding:30px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
        .section-title{color:#2c3e50;margin-bottom:20px;font-size:28px}
        table{width:100%;border-collapse:collapse;margin-top:20px;background:white;box-shadow:0 5px 15px rgba(0,0,0,0.1)}
        th{background:#2c3e50;color:white;padding:15px;text-align:left}
        td{padding:12px;border-bottom:1px solid #ddd}
    </style>
</head>
<body>
    <div class="navbar">
        <h1>📅 My Timetable</h1>
        <div class="nav-links">
            <button onclick="location.href='/student/dashboard'">Back to Dashboard</button>
        </div>
    </div>
    
    <div class="container">
        <div class="content-card">
            <h2 class="section-title">Course Schedule</h2>
            {% if timetable %}
            <table>
                <thead><tr><th>Course Name</th><th>Code</th><th>Teacher</th></tr></thead>
                <tbody>
                    {% for course in timetable %}
                    <tr>
                        <td>{{ course[0] }}</td>
                        <td>{{ course[1] }}</td>
                        <td>{{ course[2] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p style="color:#7f8c8d;text-align:center;padding:40px">No courses enrolled yet.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
