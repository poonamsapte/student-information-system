<!DOCTYPE html>
<html>
<head>
<title>Student Data</title>
</head>

<body>

<h2>Student Records</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Name</th>
<th>DOB</th>
<th>PRN</th>
<th>Aadhar</th>
<th>PAN</th>
<th>10th</th>
<th>12th</th>
<th>Course</th>
<th>Action</th>
</tr>

{% for s in students %}

<tr>
<td>{{ s[0] }}</td>
<td>{{ s[1] }}</td>
<td>{{ s[2] }}</td>
<td>{{ s[3] }}</td>
<td>{{ s[4] }}</td>
<td>{{ s[5] }}</td>
<td>{{ s[6] }}</td>
<td>{{ s[7] }}</td>
<td>{{ s[8] }}</td>
<td>
<a href="/delete/{{ s[0] }}">Delete</a>
<a href="/edit/{{ s[0] }}">Edit</a>
</td>
</tr>

{% endfor %}

</table>

</body>
</html>
