<!DOCTYPE html>
<html>
<head>
<title>Results</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
background-image:url("https://images.unsplash.com/photo-1454165804606-c3d57bc86b40");
background-size:cover;
background-position:center;
background-repeat: no-repeat;
}

/* animation box */
.box{

width:500px;
margin:80px auto;
padding:20px;

background:rgba(255,255,255,0.9);

border-radius:10px;

animation:fade 1s;

}

@keyframes fade{

from{opacity:0; transform:scale(0.5)}
to{opacity:1; transform:scale(1)}

}

h2{
text-align:center;
}

/* table style */

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid black;
padding:8px;
text-align:center;
}

th{
background:lightgray;
}

/* navbar */

.navbar{
position:absolute;
top:10px;
right:10px;
z-index:1000;
}

.navbar button{
padding:8px;
margin:3px;
background:#2c3e50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
width:auto;
}

.navbar button:hover{
background:#1a252f;
}

</style>

</head>

<body>


<div class="navbar">

<button onclick="location.href='/'">Home</button>
<button onclick="location.href='/admin'">Admin</button>
<button onclick="location.href='/teacher'">Teacher</button>
<button onclick="location.href='/student'">Student</button>
<button onclick="location.href='/courses'">Courses</button>
<button onclick="location.href='/results'">Results</button>
<button onclick="location.href='/contact'">Contact</button>
<button onclick="location.href='/dashboard'">Dashboard</button>
<button onclick="location.href='/login'">Login</button>

</div>


<div class="box">

<h2>Student Results</h2>

<table>

<tr>
<th>Roll No</th>
<th>Name</th>
<th>Subject</th>
<th>Marks</th>
</tr>

<tr>
<td>101</td>
<td>Rahul</td>
<td>Data Structure</td>
<td>85</td>
</tr>

<tr>
<td>102</td>
<td>Priya</td>
<td>Python</td>
<td>90</td>
</tr>

<tr>
<td>103</td>
<td>Amit</td>
<td>DBMS</td>
<td>88</td>
</tr>

</table>

</div>

</body>
</html>
